services:
  database:
    image: postgres:17.5-alpine
    container_name: cleverjs-test-postgres
    environment:
      POSTGRES_USER: test_db
      POSTGRES_PASSWORD: test_db
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_db"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 5s

