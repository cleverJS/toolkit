version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cleverjs-test-postgres
    environment:
      POSTGRES_USER: test_db
      POSTGRES_PASSWORD: test_db
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:

